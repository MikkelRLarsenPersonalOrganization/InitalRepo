name: Continous Delivery & Deployment

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cicdexample
  TAG: ${{ github.sha }}
  OWNER: mikkelrlarsenpersonalorganization

jobs:
  continous_delivery:
    runs-on: ubuntu-latest  
    permissions:
      contents: read
      packages: write     

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Login against a Docker registry
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/CiCd
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME}}:${{ env.TAG}}


  deploy-minikube:
    runs-on: self-hosted
    needs: continous_delivery

    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-kubectl@v4

      - uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/cicdexample cicdexample=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME}}:${{ env.TAG}} -n default
          kubectl rollout status deployment/cicdexample -n default
